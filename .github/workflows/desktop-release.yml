name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AppImage
            os: ubuntu-latest
            artifact: overcode-linux
          - name: macOS DMG
            os: macos-latest
            artifact: overcode-macos
          - name: Windows installer
            os: windows-latest
            artifact: overcode-windows

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build installer
        run: npm run build -- --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/**/*.AppImage
            release/**/*.dmg
            release/**/*.exe
            release/**/*.blockmap
            release/**/*.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
